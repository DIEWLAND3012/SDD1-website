<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iMaintain - ระบบแจ้งซ่อม (สำหรับผู้ใช้งาน)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-800 antialiased overflow-hidden">

  <div class="flex h-screen w-full">
    
    <aside id="app-sidebar" class="w-64 bg-slate-900 text-slate-300 flex flex-col transition-all duration-300 z-20 shadow-xl shrink-0">
      <div class="p-6 flex items-center gap-3 border-b border-slate-800">
        <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center text-white font-bold">iM</div>
        <h1 class="text-lg font-bold text-white tracking-wide">iMaintain<span class="text-indigo-400">.</span></h1>
      </div>
      
      <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1 no-scrollbar">
        
        <button onclick="navTo('dashboard')" id="menu-dashboard" class="menu-btn w-full flex items-center gap-3 px-4 py-2.5 text-sm font-medium rounded-lg text-white bg-indigo-600 shadow-sm transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h3m-10-11l2 2m-2-2v10a1 1 0 01-1 1h3m-10-11V4m0 2v10a1 1 0 001 1h3m10-11v10a1 1 0 01-1 1h-3"></path></svg>
          แดชบอร์ด
        </button>

        <button onclick="navTo('requests')" id="menu-requests" class="menu-btn w-full flex items-center gap-3 px-4 py-2.5 text-sm font-medium rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
          แจ้งซ่อมบำรุง
        </button>

        <button onclick="navTo('reports')" id="menu-reports" class="menu-btn w-full flex items-center gap-3 px-4 py-2.5 text-sm font-medium rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
          รายงาน / ประวัติ
        </button>

        <button onclick="navTo('profile')" id="menu-profile" class="menu-btn w-full flex items-center gap-3 px-4 py-2.5 text-sm font-medium rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          ข้อมูลส่วนตัว
        </button>

      </nav>
      
      <div class="p-4 border-t border-slate-800">
        <button onclick="doLogout()" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm font-medium rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          ออกจากระบบ
        </button>
      </div>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden relative">
      
      <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-4 lg:px-6 z-10 shrink-0 shadow-sm">
        <div>
          <span class="text-sm font-semibold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-full">พอร์ทัลผู้ใช้งานทั่วไป (User)</span>
        </div>
        
        <div class="flex items-center gap-3">
          <div class="text-right">
            <p id="user-name-display" class="text-sm font-bold text-slate-700">กำลังโหลด...</p>
            <p class="text-xs text-slate-400">ผู้ยื่นคำขอ</p>
          </div>
          <div id="user-avatar-display" class="w-9 h-9 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-sm shadow-sm">U</div>
        </div>
      </header>

      <main id="page-content" class="flex-1 overflow-y-auto overflow-x-hidden bg-slate-50 relative p-4 lg:p-6 no-scrollbar">
        </main>

    </div>
  </div>

  <script src="code.js"></script>
  <script src="Dashboardlist.js"></script> <script src="Requests.js"></script> <script src="Reports.js"></script> <script src="Profile.js"></script> <script>
    // ⚙️ Script จัดการการทำงานเบื้องต้นภายใน user.html
    document.addEventListener("DOMContentLoaded", () => {
      // ตรวจสอบว่ามี Token และแอปโหลดขึ้นมาหรือไม่
      if(!localStorage.getItem('APP_TOKEN')) {
         window.location.href = 'index.html'; // ถ้าไม่มีให้เด้งกลับไป Login
         return;
      }

      // โชว์ชื่อผู้ใช้ที่มุมขวาบน
      const user = window.APP?.user || {};
      if(user.name) {
        document.getElementById('user-name-display').innerText = user.name;
        document.getElementById('user-avatar-display').innerText = user.name.charAt(0).toUpperCase();
      }

      // เริ่มต้นที่หน้า Dashboard
      navTo('dashboard');
    });

    // ฟังก์ชันเปลี่ยนหน้าภายใน user.html โดยไม่เปลี่ยน URL (SPA ภายใน)
    function navTo(page) {
      // 1. เปลี่ยนสีเมนูที่ Active
      document.querySelectorAll('.menu-btn').forEach(btn => {
        btn.classList.remove('text-white', 'bg-indigo-600', 'shadow-sm');
        btn.classList.add('text-slate-400', 'hover:text-white', 'hover:bg-slate-800');
      });
      const activeBtn = document.getElementById(`menu-${page}`);
      if(activeBtn) {
        activeBtn.classList.remove('text-slate-400', 'hover:text-white', 'hover:bg-slate-800');
        activeBtn.classList.add('text-white', 'bg-indigo-600', 'shadow-sm');
      }

      // 2. ล้างหน้าจอแล้วเรียกฟังก์ชันวาด View ใหม่
      document.getElementById('page-content').innerHTML = '';
      
      if(page === 'dashboard') {
        pageDashboard(); // ฟังก์ชันใน Dashboardlist.js
      } else if(page === 'requests') {
        pageRequestsList(); // ฟังก์ชันใน Requests.js
      } else if(page === 'reports') {
        pageReports(); // ฟังก์ชันใน Reports.js
      } else if(page === 'profile') {
        pageProfile(); // ฟังก์ชันใน Profile.js
      }
    }

    function doLogout() {
      if(confirm('คุณยืนยันที่จะออกจากระบบหรือไม่?')) {
        localStorage.removeItem('APP_TOKEN');
        localStorage.removeItem('APP_STATE');
        window.location.href = 'index.html';
      }
    }
  </script>
</body>
</html>
